services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authplatform
    ports: 
     - "5433:5432"
    volumes: 
     - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
     - "6380:6379"
    
volumes:
  postgres_data: